<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Research</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../styles/styles.css">
        <style>
            /* Tab bar */
            .tab-bar {
                display: flex;
                gap: 0;
                border-bottom: 2px solid var(--border);
                margin-bottom: 1.2rem;
            }

            .tab-btn {
                padding: 0.45rem 1.1rem;
                font-weight: 600;
                font-size: 0.95rem;
                color: var(--muted);
                border: none;
                border-bottom: 3px solid transparent;
                margin-bottom: -2px;
                background: none;
                cursor: pointer;
                transition: color 0.15s ease, border-color 0.15s ease;
            }

            .tab-btn:hover {
                color: var(--text-primary);
            }

            .tab-btn[data-product="autostart"].active {
                color: var(--primary);
                border-bottom-color: var(--primary);
            }

            .tab-btn[data-product="game"].active {
                color: var(--secondary);
                border-bottom-color: var(--secondary);
            }

            /* Tab panels */
            .tab-panel {
                display: none;
            }

            .tab-panel.active {
                display: block;
            }

            /* Research section headings */
            .research-section {
                margin-top: 1.25rem;
                padding-top: 1rem;
                border-top: 1px solid var(--border);
            }

            .research-section:first-child {
                margin-top: 0;
                padding-top: 0;
                border-top: none;
            }

            .research-section h3 {
                margin-bottom: 0.5rem;
            }

            .research-section p {
                color: var(--text-secondary);
            }

            /* Prev / Next nav */
            .page-nav {
                display: flex;
                justify-content: space-between;
                gap: 1rem;
                margin-top: 1.5rem;
            }

            .page-nav a {
                flex: 1;
                display: block;
                padding: 0.75rem 1.2rem;
                background: var(--bg-white);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                font-weight: 600;
                font-size: 0.95rem;
                color: var(--text-secondary);
                text-decoration: none;
                transition: border-color 0.15s, color 0.15s, box-shadow 0.15s;
            }

            .page-nav a:hover {
                border-color: var(--primary);
                color: var(--primary);
                box-shadow: var(--shadow-sm);
            }

            .page-nav a.prev::before { content: '← '; }
            .page-nav a.next::after  { content: ' →'; }
            .page-nav a.next { text-align: right; }
        </style>
    </head>
    <body>
        <div id="shared-top-nav"></div>
        <div class="page-layout">
            <div id="shared-sidebar"></div>
            <main class="content">
                <div class="content-card">
                    <h1>Research</h1>
                </div>

                <div class="content-card">
                    <div class="tab-bar">
                        <button class="tab-btn" data-product="autostart">AI-Autostart</button>
                        <button class="tab-btn active" data-product="game">No-GUI Game</button>
                    </div>

                    <!-- AI-Autostart -->
                    <div class="tab-panel" data-product="autostart">

                        <div class="research-section">
                            <h3>Related Projects</h3>
                            <p>placeholder</p>
                        </div>

                        <div class="research-section">
                            <h3>Technologies</h3>
                            <p>placeholder</p>
                        </div>

                        <div class="research-section">
                            <h3>Field Research</h3>
                            <p>placeholder</p>
                        </div>

                    </div>

                    <!-- No-GUI Game -->
                    <div class="tab-panel active" data-product="game">

                        <div class="research-section">
                            <h3>Related Projects</h3>
                            <p>placeholder</p>
                        </div>

                        <div class="research-section">
                            <h3>Technologies</h3>
                            <p>placeholder</p>
                        </div>

                        <div class="research-section">
                            <h3>Field Research</h3>
                            <p>placeholder</p>
                        </div>

                    </div>
                </div>

                <!-- Prev / Next -->
                <div class="page-nav">
                    <a href="../requirements/index.html" class="prev">Requirements</a>
                    <a href="../ui-design/index.html" class="next">UI Design</a>
                </div>
            </main>
        </div>
        <script src="../scripts/section-layout.js"></script>
        <script>
            document.querySelectorAll('.tab-bar').forEach(bar => {
                bar.addEventListener('click', e => {
                    const btn = e.target.closest('.tab-btn');
                    if (!btn) return;

                    const product = btn.dataset.product;

                    bar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    const parentSection = bar.closest('.content-card');
                    parentSection.querySelectorAll('.tab-panel').forEach(panel => {
                        panel.classList.toggle('active', panel.dataset.product === product);
                    });
                });
            });
        </script>
    </body>
</html>
