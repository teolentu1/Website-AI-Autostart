<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SoundLab Games Deployment Manual</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../styles/styles.css">
        <style>
            .content,
            .content-card {
                text-align: left;
            }

            .manual-viewer {
                width: 100%;
                height: 980px;
                border: 1px solid var(--border);
                border-radius: var(--radius);
                background: var(--bg-white);
            }

            .manual-viewer iframe {
                width: 100%;
                height: 100%;
                border: none;
                border-radius: var(--radius);
                display: block;
            }

            @media (max-width: 980px) {
                .manual-viewer {
                    height: 760px;
                }
            }
        </style>
    </head>
    <body>
        <div id="shared-top-nav">
        </div>
        <div class="page-layout">
            <div id="shared-sidebar">
            </div>
            <main class="content">
                <div class="content-card">
                    <h1>SoundLab Games Deployment Manual</h1>
                    <h3>Complete deployment guide for the SoundLab Games system.</h3>
                </div>

                <div class="content-card">
                    <div class="manual-viewer">
                        <iframe src="../assets/files/soundlab-deployment-manual.pdf" title="SoundLab Games Deployment Manual"></iframe>
                    </div>
                </div>
            </main>
        </div>
        <script src="../scripts/section-layout.js">
        </script>
    </body>
</html>
